<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Arsip RSDS</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#1e3a8a,#2563eb);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-card{
background:#fff;
width:350px;
padding:30px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
text-align:center;
}

.login-card h2{
margin-bottom:20px;
color:#1e3a8a;
}

.login-card input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #d1d5db;
margin-bottom:15px;
font-size:14px;
}

.login-card button{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#1e3a8a;
color:#fff;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.login-card button:hover{
background:#2563eb;
}

.loading{
font-size:13px;
margin-top:10px;
color:#6b7280;
display:none;
}

.panel{
display:none;
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#f4f6f9;
padding:20px;
overflow:auto;
}

.search-input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #d1d5db;
font-size:14px;
margin-bottom:20px;
}

.card{
background:#fff;
border-radius:14px;
padding:14px;
margin-bottom:10px;
border:1px solid #e5e7eb;
font-size:13px;
}

.folder-link{
display:inline-block;
margin-top:6px;
color:#2563eb;
text-decoration:none;
font-weight:600;
}
</style>
</head>

<body>

<div class="login-card" id="loginBox">
<h2>Admin Arsip RSDS</h2>
<input type="password" id="password" placeholder="Masukkan Password">
<button onclick="login()">Masuk</button>
<div class="loading" id="loading">Memverifikasi...</div>
</div>

<div class="panel" id="adminPanel">
<input id="search" class="search-input" placeholder="Cari Nama Pegawai..." oninput="searchData()">
<div id="result"></div>
</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbxGClJKi7tEpn6QOHrUOGM-VIEySBE76wpyxzkSXqu3JknS3mq-n_-hFf3MiHAvH4hD/exec";

let passwordSession="";
let timer=null;

function login(){
const pass=document.getElementById("password").value.trim();
if(!pass) return;

document.getElementById("loading").style.display="block";

fetch(GAS_URL,{
method:"POST",
body:JSON.stringify({password:pass})
})
.then(r=>r.json())
.then(r=>{
document.getElementById("loading").style.display="none";

if(!r.status){
alert("Password Salah");
return;
}

passwordSession=pass;

document.getElementById("loginBox").style.display="none";
document.getElementById("adminPanel").style.display="block";
});
}

function searchData(){
clearTimeout(timer);
timer=setTimeout(()=>{
const keyword=document.getElementById("search").value.trim();
if(keyword.length<2){
document.getElementById("result").innerHTML="";
return;
}

fetch(GAS_URL,{
method:"POST",
body:JSON.stringify({
password:passwordSession,
nama:keyword
})
})
.then(r=>r.json())
.then(r=>{
if(!r.status){
alert(r.message);
return;
}
render(r.data);
});
},400);
}

function render(data){
let html="";
if(!data.length){
html="<div style='text-align:center;color:#9ca3af'>Tidak ada data</div>";
}else{
data.forEach(x=>{
html+=`<div class="card"><b>${x.sheet}</b><br>`;
Object.entries(x.detail).forEach(([k,v])=>{
if(String(v).startsWith("http")){
html+=`<a href="${v}" target="_blank" class="folder-link">📂 Buka Folder</a>`;
}else{
html+=`<div>${k}: ${v}</div>`;
}
});
html+="</div>";
});
}
document.getElementById("result").innerHTML=html;
}

</script>

</body>
</html>
