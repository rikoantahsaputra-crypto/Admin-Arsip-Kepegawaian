<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Kepegawaian RSDS</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#f4f6f9;
color:#1f2937;
}

.wrapper{
max-width:1200px;
margin:auto;
padding:20px;
}

.layout{
display:grid;
grid-template-columns: 1.5fr 1fr;
gap:20px;
}

/* LEFT SIDE */
.left-panel{
background:#fff;
padding:20px;
border-radius:16px;
border:1px solid #e5e7eb;
}

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:15px;
border-radius:12px;
border:2px solid #1e3a8a;
font-size:15px;
outline:none;
}

.search-box input:focus{
box-shadow:0 0 0 4px rgba(37,99,235,.2);
}

.card{
background:#fff;
border-radius:12px;
padding:12px;
margin-bottom:10px;
border:1px solid #e5e7eb;
font-size:13px;
}

.folder-link{
display:inline-block;
margin-top:6px;
color:#2563eb;
text-decoration:none;
font-weight:600;
}

/* RIGHT SIDE */
.right-panel{
background:#fff;
padding:20px;
border-radius:16px;
border:1px solid #e5e7eb;
height:fit-content;
}

.right-panel h3{
margin-bottom:15px;
font-size:14px;
color:#6b7280;
text-transform:uppercase;
}

.menu{
background:#f9fafb;
border-radius:12px;
padding:14px;
margin-bottom:10px;
cursor:pointer;
border:1px solid #e5e7eb;
transition:.15s;
}

.menu:hover{
background:#1e3a8a;
color:#fff;
}

.menu span{
font-size:18px;
margin-right:6px;
}

/* MOBILE */
@media(max-width:900px){
.layout{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="wrapper">

<h2 style="margin-bottom:20px;">Admin Kepegawaian RSDS</h2>

<div class="layout">

<!-- LEFT -->
<div class="left-panel">

<div class="search-box">
<input id="search" placeholder="🔍 Cari Nama Pegawai..." oninput="searchData()">
</div>

<div id="result"></div>

</div>

<!-- RIGHT -->
<div class="right-panel">

<h3>Layanan</h3>

<div class="menu" onclick="openUrl('https://rikoantah.github.io/pangkat-rsds-aktive/')">
<span>👤</span> Pangkat
</div>

<div class="menu" onclick="openUrl('https://rikoantah.github.io/Gaji-Berkala-RSDS-Soedarso/')">
<span>💰</span> Gaji Berkala
</div>

<div class="menu" onclick="openUrl('https://rikoantah.github.io/Ukom-Rsds/')">
<span>📝</span> UKOM
</div>

<div class="menu" onclick="openUrl('https://rikoantah.github.io/Jafung-D/')">
<span>💼</span> Jabatan Fungsional
</div>

<div class="menu" onclick="openUrl('https://rikoantahsaputra94-jpg.github.io/Tampilan-Cuti-Umpar/')">
<span>📅</span> Cuti
</div>

<div class="menu" onclick="openUrl('https://script.google.com/macros/s/AKfycbwAwouQ9BK6S9GzQeFtkUxKQJY_iunIfS35Jfe0wYD8L7A6-C5InI7IkFW4eSOnEKQz/exec')">
<span>🧮</span> Angka Kredit
</div>

<div class="menu" onclick="openUrl('https://rikoantah.github.io/sip-sib/')">
<span>🪪</span> SIP / SIB
</div>

<div class="menu" onclick="openUrl('https://rikoantah.github.io/slks-d/')">
<span>⭐</span> SLKS
</div>

</div>

</div>
</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbyDePhE1QYm24pJ6KoX88d5E7R8VRoxDJcBkba1GM_XU9qFKJyWfcObqqpyJ888OsPd/exec";
let timer=null;

function searchData(){
clearTimeout(timer);

timer=setTimeout(()=>{
const keyword=document.getElementById("search").value.trim();

if(keyword.length<2){
document.getElementById("result").innerHTML="";
return;
}

fetch(GAS_URL,{
method:"POST",
body:JSON.stringify({nama:keyword})
})
.then(r=>r.json())
.then(r=>{
if(!r.status){
document.getElementById("result").innerHTML="";
return;
}
render(r.data);
});
},400);
}

function render(data){
let html="";
if(!data.length){
html="<div style='text-align:center;color:#9ca3af'>Tidak ada data</div>";
}else{
data.forEach(x=>{
html+=`<div class="card"><b>${x.sheet}</b><br>`;
Object.entries(x.detail).forEach(([k,v])=>{
if(String(v).startsWith("http")){
html+=`<a href="${v}" target="_blank" class="folder-link">📂 Buka Folder</a>`;
}else{
html+=`<div>${k}: ${v}</div>`;
}
});
html+="</div>";
});
}
document.getElementById("result").innerHTML=html;
}

function openUrl(url){
window.open(url,"_blank");
}

</script>

</body>
</html>
