<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Kepegawaian RSDS</title>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6f9;}
.wrapper{max-width:1200px;margin:auto;padding:20px;}

.topbar{
display:flex;
align-items:center;
margin-bottom:20px;
}

.back-btn{
background:#1e3a8a;
color:#fff;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
margin-right:15px;
}

.layout{
display:grid;
grid-template-columns:1.5fr 1fr;
gap:20px;
}

.left-panel,.right-panel{
background:#fff;
padding:20px;
border-radius:16px;
border:1px solid #e5e7eb;
}

.search-area{position:relative;margin-bottom:15px;}

.search-area input{
width:100%;
padding:14px;
border-radius:12px;
border:2px solid #1e3a8a;
}

.suggestions{
position:absolute;
background:#fff;
width:100%;
border:1px solid #e5e7eb;
border-radius:10px;
max-height:150px;
overflow-y:auto;
z-index:10;
}

.suggestions div{
padding:8px 12px;
cursor:pointer;
}

.suggestions div:hover{
background:#f3f4f6;
}

button{
padding:10px 15px;
border:none;
background:#1e3a8a;
color:#fff;
border-radius:8px;
cursor:pointer;
margin-bottom:15px;
}

.card{
border:1px solid #e5e7eb;
padding:10px;
border-radius:12px;
margin-bottom:10px;
font-size:13px;
}

@media(max-width:900px){
.layout{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="wrapper">

<div class="topbar">
<div class="back-btn" onclick="goBack()">⬅ Back</div>
<h2>Admin Kepegawaian RSDS</h2>
</div>

<div class="layout">

<div class="left-panel">

<div class="search-area">
<input id="searchInput" placeholder="Ketik Nama Pegawai..." oninput="getSuggestions()">
<div id="suggestions" class="suggestions"></div>
</div>

<button onclick="searchArsip()">Cari</button>

<div id="result"></div>

</div>

<div class="right-panel">
<h3>Layanan</h3>
<div onclick="openUrl('https://rikoantah.github.io/pangkat-rsds-aktive/')">👤 Pangkat</div>
<div onclick="openUrl('https://rikoantah.github.io/Gaji-Berkala-RSDS-Soedarso/')">💰 Gaji Berkala</div>
<div onclick="openUrl('https://rikoantah.github.io/Ukom-Rsds/')">📝 UKOM</div>
<div onclick="openUrl('https://rikoantah.github.io/Jafung-D/')">💼 Jafung</div>
</div>

</div>
</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbxyZIrqJrpcNoRreofctwrVVc_TVd8oJ1SadZZt7pqwGpxoA24pOfGrUw9vtuJXquD-/exec";

let selectedName="";

function goBack(){
window.location.href="ISI_URL_BACK_DISINI";
}

function getSuggestions(){
const keyword=document.getElementById("searchInput").value.trim();
if(keyword.length<2){
document.getElementById("suggestions").innerHTML="";
return;
}

fetch(GAS_URL,{
method:"POST",
body:JSON.stringify({mode:"suggest",keyword})
})
.then(r=>r.json())
.then(r=>{
if(!r.status) return;

let html="";
r.data.forEach(name=>{
html+=`<div onclick="selectName('${name}')">${name}</div>`;
});
document.getElementById("suggestions").innerHTML=html;
});
}

function selectName(name){
selectedName=name;
document.getElementById("searchInput").value=name;
document.getElementById("suggestions").innerHTML="";
}

function searchArsip(){
if(!selectedName) return;

fetch(GAS_URL,{
method:"POST",
body:JSON.stringify({mode:"search",nama:selectedName})
})
.then(r=>r.json())
.then(r=>{
if(!r.status) return;
render(r.data);
});
}

function render(data){
let html="";
data.forEach(x=>{
html+=`<div class="card"><b>${x.sheet}</b><br>`;
Object.entries(x.detail).forEach(([k,v])=>{
if(String(v).startsWith("http")){
html+=`<div><a href="${v}" target="_blank">📂 Buka Folder</a></div>`;
}else{
html+=`<div>${k}: ${v}</div>`;
}
});
html+="</div>";
});
document.getElementById("result").innerHTML=html;
}

function openUrl(url){
window.open(url,"_blank");
}

</script>

</body>
</html>
