<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Kepegawaian RSDS</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#f4f6f9;
color:#1f2937;
}

.wrapper{
max-width:1100px;
margin:auto;
padding:20px;
}

/* HEADER */
.header{
margin-bottom:20px;
}

.header h2{
margin-bottom:10px;
}

/* SEARCH BOX MODERN */
.search-box{
position:relative;
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:16px 20px;
border-radius:50px;
border:2px solid #1e3a8a;
font-size:15px;
outline:none;
transition:.2s;
}

.search-box input:focus{
box-shadow:0 0 0 4px rgba(37,99,235,.2);
}

.search-icon{
position:absolute;
right:20px;
top:50%;
transform:translateY(-50%);
font-size:18px;
color:#1e3a8a;
}

/* GRID LAYANAN */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:25px;
}

.menu{
background:#fff;
border-radius:14px;
padding:18px;
text-align:center;
border:1px solid #e5e7eb;
cursor:pointer;
transition:.15s;
}

.menu:hover{
box-shadow:0 6px 18px rgba(0,0,0,.1);
transform:translateY(-2px);
}

.menu span{
font-size:26px;
display:block;
margin-bottom:6px;
}

/* CARD */
.card{
background:#fff;
border-radius:14px;
padding:14px;
margin-bottom:10px;
border:1px solid #e5e7eb;
font-size:13px;
}

.folder-link{
display:inline-block;
margin-top:6px;
color:#2563eb;
text-decoration:none;
font-weight:600;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<h2>Admin Kepegawaian RSDS</h2>
</div>

<div class="search-box">
<input id="search" placeholder="🔍 Ketik Nama Pegawai..." oninput="searchData()">
<div class="search-icon">🔎</div>
</div>

<div class="grid">
<div class="menu" onclick="openUrl('https://rikoantah.github.io/pangkat-rsds-aktive/')"><span>👤</span>Pangkat</div>
<div class="menu" onclick="openUrl('https://rikoantah.github.io/Gaji-Berkala-RSDS-Soedarso/')"><span>💰</span>Gaji Berkala</div>
<div class="menu" onclick="openUrl('https://rikoantah.github.io/Ukom-Rsds/')"><span>📝</span>UKOM</div>
<div class="menu" onclick="openUrl('https://rikoantah.github.io/Jafung-D/')"><span>💼</span>Jabatan Fungsional</div>
<div class="menu" onclick="openUrl('https://rikoantahsaputra94-jpg.github.io/Tampilan-Cuti-Umpar/')"><span>📅</span>Cuti</div>
<div class="menu" onclick="openUrl('https://script.google.com/macros/s/AKfycbwAwouQ9BK6S9GzQeFtkUxKQJY_iunIfS35Jfe0wYD8L7A6-C5InI7IkFW4eSOnEKQz/exec')"><span>🧮</span>Angka Kredit</div>
<div class="menu" onclick="openUrl('https://rikoantah.github.io/sip-sib/')"><span>🪪</span>SIP / SIB</div>
<div class="menu" onclick="openUrl('https://rikoantah.github.io/slks-d/')"><span>⭐</span>SLKS</div>
</div>

<div id="result"></div>

</div>

<script>

const GAS_URL="PASTE_URL_WEB_APP_DISINI";
let timer=null;

function searchData(){
clearTimeout(timer);

timer=setTimeout(()=>{
const keyword=document.getElementById("search").value.trim();

if(keyword.length<2){
document.getElementById("result").innerHTML="";
return;
}

fetch(GAS_URL,{
method:"POST",
body:JSON.stringify({nama:keyword})
})
.then(r=>r.json())
.then(r=>{
if(!r.status){
document.getElementById("result").innerHTML="";
return;
}
render(r.data);
});
},400);
}

function render(data){
let html="";
if(!data.length){
html="<div style='text-align:center;color:#9ca3af'>Tidak ada data</div>";
}else{
data.forEach(x=>{
html+=`<div class="card"><b>${x.sheet}</b><br>`;
Object.entries(x.detail).forEach(([k,v])=>{
if(String(v).startsWith("http")){
html+=`<a href="${v}" target="_blank" class="folder-link">📂 Buka Folder</a>`;
}else{
html+=`<div>${k}: ${v}</div>`;
}
});
html+="</div>";
});
}
document.getElementById("result").innerHTML=html;
}

function openUrl(url){
window.open(url,"_blank");
}

</script>

</body>
</html>
